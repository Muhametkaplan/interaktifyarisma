<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anonim Soru Sor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    button { touch-action: manipulation; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center font-sans antialiased text-gray-800">

  <div class="w-full max-w-md bg-white shadow-2xl flex flex-col relative overflow-hidden h-screen border-t-8 border-cyan-500">

    <!-- Çıkış Butonu -->
    <button id="btn-exit" class="hidden absolute top-4 left-4 text-cyan-100 hover:text-white z-50 p-2 bg-black/20 rounded-full backdrop-blur-sm transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>

    <!-- 0. YÜKLENİYOR -->
    <div id="screen-loading" class="flex-1 bg-white flex flex-col items-center justify-center p-6">
      <svg class="w-12 h-12 animate-spin text-cyan-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>

    <!-- 1. GİRİŞ EKRANI -->
    <div id="screen-join" class="hidden flex-1 bg-cyan-50 flex-col items-center justify-center p-6 sm:p-8">
      <div class="bg-cyan-100 p-5 rounded-full mb-6 shadow-inner">
         <svg class="w-12 h-12 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
      </div>
      <h2 class="text-3xl font-black text-gray-800 mb-2 text-center tracking-tight">Soru-Cevap Tahtası</h2>
      <p class="text-gray-500 text-center mb-8 font-medium">Bağlanmak için sadece PIN gir.</p>
      
      <div id="error-msg" class="hidden w-full bg-red-100 text-red-700 p-4 rounded-xl mb-6 font-bold text-sm text-center border border-red-200"></div>
      
      <form id="join-form" class="w-full space-y-4">
        <input id="input-pin" type="number" placeholder="Oturum PIN Kodu" class="w-full text-center text-2xl font-bold p-5 border-2 border-gray-300 rounded-2xl outline-none focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100 bg-white transition" required />
        <button type="submit" class="w-full bg-cyan-600 text-white font-black text-xl p-5 rounded-2xl hover:bg-cyan-700 active:scale-95 transition-all shadow-lg mt-4">Odya Katıl</button>
      </form>
    </div>

    <!-- 2. CANLI AKIŞ EKRANI -->
    <div id="screen-live" class="hidden flex-1 flex-col bg-gray-50 h-full overflow-hidden relative">
       
       <!-- Başlık & Soru Sorma Formu (Sabit Üst Kısım) -->
       <div class="bg-cyan-600 text-white pt-16 pb-6 px-6 shadow-md z-10 flex-shrink-0 rounded-b-3xl">
          <h3 id="session-title" class="text-center font-bold text-lg mb-4 text-cyan-100 line-clamp-1">Oturum Başlığı</h3>
          <form id="form-ask" class="relative">
             <textarea id="input-question" class="w-full bg-white text-gray-800 p-4 pr-16 rounded-2xl outline-none border border-cyan-400 font-medium text-base resize-none shadow-inner" rows="2" placeholder="Anonim bir soru sor..." maxLength="200" required></textarea>
             <button type="submit" class="absolute right-2 bottom-3 bg-cyan-500 hover:bg-cyan-400 text-white p-3 rounded-xl transition shadow-sm">
                <svg class="w-5 h-5 transform rotate-45 -mt-1 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
             </button>
          </form>
       </div>

       <!-- Sorular Listesi (Kaydırılabilir) -->
       <div id="questions-feed" class="flex-1 overflow-y-auto p-4 space-y-4">
          <!-- JS ile Dolacak -->
       </div>

       <!-- Oda Kapandı Mesajı -->
       <div id="closed-message" class="hidden absolute inset-0 bg-gray-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
          <div class="bg-white p-8 rounded-3xl text-center shadow-2xl">
             <svg class="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
             <h2 class="text-2xl font-black text-gray-800 mb-2">Oturum Sona Erdi</h2>
             <p class="text-gray-600 mb-6">Yönetici soru-cevap tahtasını kapattı.</p>
             <button onclick="handleExit()" class="bg-gray-800 text-white px-8 py-3 rounded-xl font-bold w-full">Ana Menü</button>
          </div>
       </div>

    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let firebaseConfig = {};
    if (typeof __firebase_config !== 'undefined' && __firebase_config) firebaseConfig = JSON.parse(__firebase_config);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const SESSIONS_PATH = 'qaSessions';
    const QUESTIONS_PATH = 'qaQuestions';

    let user = null;
    let joinedPin = '';
    let questionsFeed = [];
    let unsubSession = null;
    let unsubQuestions = null;

    function showScreen(screenId) {
      ['loading', 'join', 'live'].forEach(s => {
        document.getElementById(`screen-${s}`).classList.add('hidden');
        document.getElementById(`screen-${s}`).classList.remove('flex');
      });
      document.getElementById(`screen-${screenId}`).classList.remove('hidden');
      document.getElementById(`screen-${screenId}`).classList.add('flex');
      
      if(screenId === 'live') {
          document.getElementById('btn-exit').classList.remove('hidden');
      } else {
          document.getElementById('btn-exit').classList.add('hidden');
      }
    }

    onAuthStateChanged(auth, (currentUser) => {
      user = currentUser;
      if(user && !joinedPin) showScreen('join');
    });

    signInAnonymously(auth).catch(e => console.error(e));

    // Odaya Katıl
    document.getElementById('join-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if(!user) return;
      const formPin = document.getElementById('input-pin').value;

      try {
        const sessionDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', SESSIONS_PATH, formPin));
        if (!sessionDoc.exists() || sessionDoc.data().state !== 'live') {
           const errEl = document.getElementById('error-msg');
           errEl.innerText = "Hatalı PIN veya oturum aktif değil.";
           errEl.classList.remove('hidden');
           return;
        }

        joinedPin = formPin;
        document.getElementById('session-title').innerText = sessionDoc.data().title;
        document.getElementById('error-msg').classList.add('hidden');
        listenToRoom();
      } catch (err) { console.error(err); }
    });

    function listenToRoom() {
      showScreen('live');

      // Oturumu Dinle (Kapanıp kapanmadığını anlamak için)
      if(unsubSession) unsubSession();
      unsubSession = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', SESSIONS_PATH, joinedPin), (docSnap) => {
         if (!docSnap.exists()) {
             document.getElementById('closed-message').classList.remove('hidden');
         }
      });

      // Soruları Dinle
      if(unsubQuestions) unsubQuestions();
      unsubQuestions = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', QUESTIONS_PATH), (snap) => {
         const allQuestions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
         questionsFeed = allQuestions.filter(q => q.pin === joinedPin);
         
         // Sıralama: Çok Beğenilenler Üstte
         questionsFeed.sort((a, b) => (b.upvotes || 0) - (a.upvotes || 0) || b.createdAt - a.createdAt);
         renderFeed();
      });
    }

    // Soru Sor
    document.getElementById('form-ask').addEventListener('submit', async (e) => {
       e.preventDefault();
       if(!user || !joinedPin) return;
       const input = document.getElementById('input-question');
       const text = input.value.trim();
       if(!text) return;

       input.value = ''; // Gönderince temizle
       const randomId = Math.random().toString(36).substring(2, 15);

       await setDoc(doc(db, 'artifacts', appId, 'public', 'data', QUESTIONS_PATH, randomId), {
           pin: joinedPin,
           text: text,
           upvotes: 0,
           upvotedBy: [], // Beğenen kişilerin UID listesi
           createdAt: Date.now()
       });
    });

    // Oy Ver / Geri Çek
    window.toggleUpvote = async function(qId) {
        if(!user) return;
        const q = questionsFeed.find(q => q.id === qId);
        if(!q) return;

        let newUpvotedBy = q.upvotedBy ? [...q.upvotedBy] : [];
        const hasVoted = newUpvotedBy.includes(user.uid);

        if (hasVoted) {
            newUpvotedBy = newUpvotedBy.filter(id => id !== user.uid); // Oyunu geri al
        } else {
            newUpvotedBy.push(user.uid); // Oy ver
        }

        // Görselin anında değişmesi için optimistik olarak UI güncellenebilir ama Firebase hızlıdır
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', QUESTIONS_PATH, qId), {
            upvotedBy: newUpvotedBy,
            upvotes: newUpvotedBy.length
        });
    };

    function renderFeed() {
       const container = document.getElementById('questions-feed');
       container.innerHTML = '';
       
       if(questionsFeed.length === 0) {
           container.innerHTML = `<div class="text-center text-gray-400 mt-10 font-medium">Henüz soru sorulmadı. İlk soran sen ol!</div>`;
           return;
       }

       questionsFeed.forEach(q => {
          const upvotes = q.upvotes || 0;
          const hasVoted = q.upvotedBy && q.upvotedBy.includes(user?.uid);
          
          const btnClass = hasVoted ? 'bg-cyan-100 text-cyan-700 border-cyan-300' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100';
          const iconFill = hasVoted ? 'currentColor' : 'none';

          container.innerHTML += `
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex gap-3 animate-fade-in relative">
               
               <button onclick="toggleUpvote('${q.id}')" class="flex flex-col items-center justify-center border rounded-xl w-14 h-14 flex-shrink-0 transition active:scale-95 ${btnClass}">
                  <svg class="w-6 h-6 mb-0.5" fill="${iconFill}" stroke="currentColor" viewBox="0 0 20 20" stroke-width="1.5"><path fill-rule="evenodd" d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z" clip-rule="evenodd"></path></svg>
                  <span class="font-black text-sm leading-none">${upvotes}</span>
               </button>
               
               <div class="flex-1 pt-1 overflow-hidden">
                 <p class="text-gray-800 font-medium text-sm leading-snug break-words whitespace-normal pr-1">${q.text}</p>
               </div>
            </div>
          `;
       });
    }

    window.handleExit = function() {
       if(unsubSession) unsubSession();
       if(unsubQuestions) unsubQuestions();
       joinedPin = ''; questionsFeed = [];
       document.getElementById('input-pin').value = '';
       document.getElementById('closed-message').classList.add('hidden');
       showScreen('join');
    };

    document.getElementById('btn-exit').addEventListener('click', handleExit);
  </script>
</body>
</html>
