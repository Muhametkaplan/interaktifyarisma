<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çekiliş Aracı | Kampüs Etkinlik</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Özel Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* Animasyonlar */
    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in-up 0.5s ease-out forwards; }
    
    /* Hızlı İsim Dönme Efekti İçin Blur */
    .motion-blur { filter: blur(1px); opacity: 0.8; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 flex flex-col selection:bg-emerald-300">

  <!-- Üst Bar -->
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm sticky top-0 z-30">
    <div class="flex items-center gap-3">
      <div class="bg-emerald-100 p-2 rounded-lg">
        <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      </div>
      <h1 class="text-2xl font-black text-gray-800 tracking-tight">Çekiliş Aracı</h1>
    </div>
    <a href="index.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold transition flex items-center gap-2 text-sm sm:text-base">
      <svg class="w-5 h-5 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Ana Sayfa
    </a>
  </header>

  <!-- Ana İçerik -->
  <main class="flex-1 flex flex-col lg:flex-row max-w-7xl mx-auto w-full p-4 sm:p-6 gap-6 lg:gap-10 h-full">
    
    <!-- SOL: Kontrol Paneli -->
    <div class="w-full lg:w-1/3 flex flex-col bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden h-fit lg:sticky lg:top-24 z-10">
      <div class="bg-emerald-600 text-white p-6">
        <h2 class="text-2xl font-bold mb-2">Çekiliş Ayarları</h2>
        <p class="text-emerald-100 text-sm">Listeyi yapıştırın ve kazanan sayılarını belirleyin.</p>
      </div>
      
      <div class="p-6 flex flex-col flex-1">
        <label class="font-bold text-gray-700 mb-2 block">Katılımcı Listesi</label>
        <textarea 
          id="names-input" 
          class="w-full min-h-[200px] lg:min-h-[250px] p-4 border-2 border-gray-200 rounded-xl outline-none focus:border-emerald-500 transition resize-none font-medium leading-relaxed mb-2"
          placeholder="Her satıra bir isim girin..."
        >Ahmet Yılmaz
Ayşe Demir
Mehmet Kaya
Fatma Çelik
Mustafa Öztürk
Zeynep Şahin
Ali Yıldız
Elif Doğan
Hasan Kara
Emine Polat
Burak Kaplan
Ceren Yıldırım</textarea>
        
        <div class="flex items-center justify-between text-sm font-bold text-gray-500 mb-6">
          <span>Toplam: <span id="item-count" class="text-emerald-600 text-lg">12</span> Katılımcı</span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
           <div>
             <label class="font-bold text-gray-700 mb-2 block text-sm">Asil Sayısı</label>
             <input type="number" id="main-winner-count" value="1" min="1" class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-emerald-500 text-center font-bold text-xl">
           </div>
           <div>
             <label class="font-bold text-gray-700 mb-2 block text-sm">Yedek Sayısı</label>
             <input type="number" id="backup-winner-count" value="1" min="0" class="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-emerald-500 text-center font-bold text-xl">
           </div>
        </div>

        <button 
          id="btn-draw" 
          class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white font-black text-xl py-4 rounded-xl transition-all shadow-[0_4px_0_#047857] active:shadow-[0_0px_0_#047857] active:translate-y-1 flex items-center justify-center gap-2"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
          ÇEKİLİŞİ BAŞLAT
        </button>
      </div>
    </div>

    <!-- SAĞ: Sonuç Ekranı -->
    <div class="w-full lg:w-2/3 flex flex-col bg-white rounded-3xl shadow-lg border border-gray-100 p-6 sm:p-10 min-h-[500px] relative overflow-hidden">
      
      <!-- Durum 1: Bekleme -->
      <div id="state-waiting" class="flex-1 flex flex-col items-center justify-center text-center opacity-100 transition-opacity duration-300">
         <div class="w-32 h-32 bg-emerald-50 rounded-full flex items-center justify-center mb-6 border-4 border-emerald-100">
           <svg class="w-16 h-16 text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
         </div>
         <h2 class="text-3xl font-black text-gray-300 mb-2">Çekiliş Bekleniyor</h2>
         <p class="text-gray-400">Ayarlarınızı yapın ve çekilişi başlatın.</p>
      </div>

      <!-- Durum 2: Animasyon (Karıştırma) -->
      <div id="state-animating" class="hidden flex-1 flex-col items-center justify-center text-center">
         <h2 class="text-2xl font-bold text-gray-500 mb-8 uppercase tracking-widest animate-pulse">Talihliler Belirleniyor...</h2>
         <div class="bg-gray-50 border-2 border-dashed border-gray-300 rounded-3xl w-full max-w-md h-32 flex items-center justify-center overflow-hidden relative shadow-inner">
            <div id="shuffle-text" class="text-4xl font-black text-emerald-600 motion-blur w-full truncate px-4">İSİM</div>
         </div>
      </div>

      <!-- Durum 3: Sonuçlar -->
      <div id="state-results" class="hidden flex-1 flex-col h-full overflow-y-auto">
         <div class="text-center mb-10">
           <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full mb-4">
             <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
           </div>
           <h2 class="text-4xl font-black text-gray-800">Çekiliş Sonuçları</h2>
         </div>

         <div class="space-y-8">
            <!-- Asil Kazananlar -->
            <div>
              <h3 class="text-xl font-bold text-emerald-700 border-b-2 border-emerald-100 pb-2 mb-4 flex items-center gap-2">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                Asil Talihliler
              </h3>
              <div id="main-winners-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                 <!-- JavaScript ile doldurulacak -->
              </div>
            </div>

            <!-- Yedek Kazananlar -->
            <div id="backup-section" class="hidden">
              <h3 class="text-xl font-bold text-gray-500 border-b-2 border-gray-100 pb-2 mb-4 flex items-center gap-2 mt-8">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Yedek Talihliler
              </h3>
              <div id="backup-winners-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 opacity-80">
                 <!-- JavaScript ile doldurulacak -->
              </div>
            </div>
         </div>
      </div>

    </div>
  </main>

  <!-- UYARI MODALI -->
  <div id="modal-alert" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white max-w-sm w-full p-6 rounded-2xl shadow-xl text-center">
      <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      </div>
      <h3 id="alert-text" class="text-lg font-bold text-gray-800 mb-6">Uyarı mesajı buraya gelecek.</h3>
      <button onclick="document.getElementById('modal-alert').classList.add('hidden')" class="w-full bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-900 transition">Anladım</button>
    </div>
  </div>

  <script>
    // --- DOM ELEMENTLERİ ---
    const namesInput = document.getElementById('names-input');
    const itemCountSpan = document.getElementById('item-count');
    const mainCountInput = document.getElementById('main-winner-count');
    const backupCountInput = document.getElementById('backup-winner-count');
    const btnDraw = document.getElementById('btn-draw');
    
    // Durum Ekranları
    const stateWaiting = document.getElementById('state-waiting');
    const stateAnimating = document.getElementById('state-animating');
    const stateResults = document.getElementById('state-results');
    const shuffleText = document.getElementById('shuffle-text');
    
    // Sonuç Listeleri
    const mainWinnersList = document.getElementById('main-winners-list');
    const backupSection = document.getElementById('backup-section');
    const backupWinnersList = document.getElementById('backup-winners-list');
    
    // Uyarı Modalı
    const modalAlert = document.getElementById('modal-alert');
    const alertText = document.getElementById('alert-text');

    // Renk Paleti (Konfetiler İçin)
    const colors = ['#10b981', '#34d399', '#059669', '#f59e0b', '#fbbf24', '#3b82f6'];

    // --- YARDIMCI FONKSİYONLAR ---

    // Textarea her değiştiğinde sayacı güncelle
    namesInput.addEventListener('input', () => {
      const items = getValidNames();
      itemCountSpan.innerText = items.length;
    });

    function getValidNames() {
      const rawText = namesInput.value;
      return rawText.split('\n').map(item => item.trim()).filter(item => item !== '');
    }

    function showAlert(msg) {
      alertText.innerText = msg;
      modalAlert.classList.remove('hidden');
    }

    // Fisher-Yates Shuffle Algoritması (Listeyi Karıştırmak İçin)
    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    // Basit HTML Konfeti Efekti
    function throwConfetti() {
      for(let i=0; i<80; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'fixed w-3 h-3 rounded-sm z-50 pointer-events-none';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = '50%';
        confetti.style.top = '20%';
        confetti.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 360}deg)`;
        
        const tx = (Math.random() - 0.5) * window.innerWidth;
        const ty = (Math.random() + 0.2) * window.innerHeight; // Aşağı doğru düşmesi için
        
        confetti.animate([
          { transform: `translate(-50%, -50%) rotate(0deg)`, opacity: 1 },
          { transform: `translate(calc(-50% + ${tx}px), ${ty}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
        ], {
          duration: 1500 + Math.random() * 1500,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          fill: 'forwards'
        });
        
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    // --- ANA ÇEKİLİŞ MANTIĞI ---
    btnDraw.addEventListener('click', () => {
      const items = getValidNames();
      const mainCount = parseInt(mainCountInput.value);
      const backupCount = parseInt(backupCountInput.value);

      // Doğrulamalar
      if (items.length === 0) {
        showAlert("Lütfen çekiliş için en az 1 kişi girin.");
        return;
      }
      if (isNaN(mainCount) || mainCount < 1) {
        showAlert("Asil kazanan sayısı en az 1 olmalıdır.");
        return;
      }
      if (isNaN(backupCount) || backupCount < 0) {
        showAlert("Yedek kazanan sayısı 0 veya daha büyük olmalıdır.");
        return;
      }
      if (mainCount + backupCount > items.length) {
        showAlert(`Girdiğiniz toplam talihli sayısı (${mainCount + backupCount}), listedeki kişi sayısından (${items.length}) fazla olamaz!`);
        return;
      }

      // Butonu devre dışı bırak
      btnDraw.disabled = true;
      btnDraw.classList.add('opacity-50', 'cursor-not-allowed');

      // Ekranı Animasyon moduna al
      stateWaiting.classList.add('hidden');
      stateResults.classList.add('hidden');
      stateAnimating.classList.remove('hidden');
      stateAnimating.classList.add('flex');

      // Heyecan Efekti (İsimleri Hızlıca Döndür)
      let shuffleInterval;
      let shuffleCount = 0;
      const maxShuffles = 30; // Animasyon süresi (30 * 80ms = ~2.4 saniye)

      shuffleInterval = setInterval(() => {
        const randomName = items[Math.floor(Math.random() * items.length)];
        shuffleText.innerText = randomName;
        shuffleCount++;

        if (shuffleCount >= maxShuffles) {
          clearInterval(shuffleInterval);
          finishDraw(items, mainCount, backupCount);
        }
      }, 80);
    });

    // Çekiliş Sonuçlarını Göster
    function finishDraw(items, mainCount, backupCount) {
      // Listeyi karıştır ve kazananları seç
      const shuffledItems = shuffleArray(items);
      const mainWinners = shuffledItems.slice(0, mainCount);
      const backupWinners = shuffledItems.slice(mainCount, mainCount + backupCount);

      // DOM'u temizle
      mainWinnersList.innerHTML = '';
      backupWinnersList.innerHTML = '';

      // Asil Kazananları Ekrana Bas (Staggered Animation ile)
      mainWinners.forEach((winner, index) => {
        const div = document.createElement('div');
        div.className = `bg-emerald-50 border border-emerald-200 p-4 rounded-xl font-black text-xl text-emerald-800 shadow-sm flex items-center gap-3 opacity-0`;
        div.style.animation = `fade-in-up 0.5s ease-out ${index * 0.1}s forwards`;
        div.innerHTML = `
          <div class="bg-emerald-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-md flex-shrink-0">${index + 1}</div>
          <span class="truncate">${winner}</span>
        `;
        mainWinnersList.appendChild(div);
      });

      // Yedek Kazananları Ekrana Bas
      if (backupCount > 0) {
        backupSection.classList.remove('hidden');
        backupWinners.forEach((winner, index) => {
          const div = document.createElement('div');
          div.className = `bg-gray-100 border border-gray-200 p-3 rounded-xl font-bold text-lg text-gray-600 flex items-center gap-3 opacity-0`;
          // Animasyon gecikmesini asillerin bitiminden başlat
          div.style.animation = `fade-in-up 0.5s ease-out ${(mainCount * 0.1) + (index * 0.1)}s forwards`;
          div.innerHTML = `
            <div class="bg-gray-300 text-gray-700 w-7 h-7 rounded-full flex items-center justify-center text-xs flex-shrink-0">${index + 1}</div>
            <span class="truncate">${winner}</span>
          `;
          backupWinnersList.appendChild(div);
        });
      } else {
        backupSection.classList.add('hidden');
      }

      // Ekran Geçişi
      stateAnimating.classList.add('hidden');
      stateAnimating.classList.remove('flex');
      stateResults.classList.remove('hidden');
      stateResults.classList.add('flex');

      // Konfeti ve Butonu Aktif Et
      throwConfetti();
      btnDraw.disabled = false;
      btnDraw.classList.remove('opacity-50', 'cursor-not-allowed');
      btnDraw.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> YENİDEN ÇEKİLİŞ YAP`;
    }
    
    // Sayfa açıldığında sayacı ilk kez hesapla
    itemCountSpan.innerText = getValidNames().length;
  </script>
</body>
</html>
